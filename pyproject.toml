[project]
name = "PAC"
version = "2.0.0"
requires-python = ">=3.14,<3.15"
dependencies = [
    "arviz",
    "disba",
    "matplotlib",
    "numpy",
    "obspy",
    "pandas",
    "plotly",
    "scipy",
    "pydantic",
    "pyyaml",
]

[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[tool.setuptools.package-dir]
"" = "src"

[tool.setuptools.packages.find]
where = ["src"]

[tool.ruff]
target-version = "py314"