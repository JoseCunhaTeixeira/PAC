[project]
name = "PAC"
version = "2.0.0"
requires-python = ">=3.14,<3.15"
dependencies = [
    "numpy",
    "obspy",
    "pydantic",
    "pyyaml",
    "fastapi[standard]",
    "sigproc",
]

[tool.uv.sources]
sigproc = { path = "../sigproc", editable = true }

[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[tool.setuptools.package-dir]
"" = "src"

[tool.setuptools.packages.find]
where = ["src"]